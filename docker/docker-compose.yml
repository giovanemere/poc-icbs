version: '3.8'

# =============================================================================
# Docker Compose for WebLogic Oracle Feature Flags System
# Registry: edissonz8809 (Docker Hub)
# Environment: Development
# =============================================================================

services:
  # =============================================================================
  # WebLogic Server A - Version A
  # =============================================================================
  weblogic-a:
    build:
      context: ${BUILD_CONTEXT}
      dockerfile: ${DOCKERFILE_WEBLOGIC}
      args:
        VERSION: ${WEBLOGIC_VERSION_A}
        ADMIN_PASSWORD: ${WEBLOGIC_ADMIN_PASSWORD}
      platforms:
        - ${DOCKER_PLATFORM}
    image: ${WEBLOGIC_IMAGE}
    container_name: weblogic-a
    environment:
      - ADMIN_PASSWORD=${WEBLOGIC_ADMIN_PASSWORD}
      - VERSION=${WEBLOGIC_VERSION_A}
      - ORACLE_HOME=/u01/oracle
      - DOMAIN_HOME=/u01/oracle/user_projects/domains/${WEBLOGIC_DOMAIN_NAME}
    ports:
      - "${WEBLOGIC_EXTERNAL_PORT_A}:${WEBLOGIC_LISTEN_PORT_A}"
      - "7002:7002"
    volumes:
      - ${WEBLOGIC_A_LOGS_VOLUME}:/u01/oracle/user_projects/domains/${WEBLOGIC_DOMAIN_NAME}/servers/AdminServer/logs
      - ${WEBLOGIC_A_MONITORING_VOLUME}:/u01/oracle/logs/weblogic-monitoring
      - ../autodeploy:/u01/oracle/user_projects/domains/${WEBLOGIC_DOMAIN_NAME}/autodeploy
    networks:
      - ${NETWORK_NAME}
    depends_on:
      orcldb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${WEBLOGIC_LISTEN_PORT_A}/console"]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
      start_period: 60s
    restart: unless-stopped
    labels:
      - "application=weblogic-feature-flags"
      - "version=${WEBLOGIC_VERSION_A}"
      - "environment=${DEPLOY_ENVIRONMENT}"

  # =============================================================================
  # WebLogic Server B - Version B
  # =============================================================================
  weblogic-b:
    build:
      context: ${BUILD_CONTEXT}
      dockerfile: ${DOCKERFILE_WEBLOGIC}
      args:
        VERSION: ${WEBLOGIC_VERSION_B}
        ADMIN_PASSWORD: ${WEBLOGIC_ADMIN_PASSWORD}
      platforms:
        - ${DOCKER_PLATFORM}
    image: ${WEBLOGIC_IMAGE}
    container_name: weblogic-b
    environment:
      - ADMIN_PASSWORD=${WEBLOGIC_ADMIN_PASSWORD}
      - VERSION=${WEBLOGIC_VERSION_B}
      - ORACLE_HOME=/u01/oracle
      - DOMAIN_HOME=/u01/oracle/user_projects/domains/${WEBLOGIC_DOMAIN_NAME}
    ports:
      - "${WEBLOGIC_EXTERNAL_PORT_B}:${WEBLOGIC_LISTEN_PORT_B}"
      - "7002"
    volumes:
      - ${WEBLOGIC_B_LOGS_VOLUME}:/u01/oracle/user_projects/domains/${WEBLOGIC_DOMAIN_NAME}/servers/AdminServer/logs
      - ${WEBLOGIC_B_MONITORING_VOLUME}:/u01/oracle/logs/weblogic-monitoring
      - ../autodeploy:/u01/oracle/user_projects/domains/${WEBLOGIC_DOMAIN_NAME}/autodeploy
    networks:
      - ${NETWORK_NAME}
    depends_on:
      orcldb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${WEBLOGIC_LISTEN_PORT_B}/console"]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
      start_period: 60s
    restart: unless-stopped
    labels:
      - "application=weblogic-feature-flags"
      - "version=${WEBLOGIC_VERSION_B}"
      - "environment=${DEPLOY_ENVIRONMENT}"

  # =============================================================================
  # HAProxy Load Balancer
  # =============================================================================
  haproxy:
    build:
      context: ${BUILD_CONTEXT}
      dockerfile: ${DOCKERFILE_HAPROXY}
      platforms:
        - ${DOCKER_PLATFORM}
    image: ${HAPROXY_IMAGE}
    container_name: haproxy
    environment:
      - HAPROXY_STATS_USER=${HAPROXY_STATS_USER}
      - HAPROXY_STATS_PASSWORD=${HAPROXY_STATS_PASSWORD}
    ports:
      - "8080:8080"
      - "8081:8081"
      - "${HAPROXY_ADMIN_PORT}:8082"
      - "${HAPROXY_WEB_PORT}:80"
      - "${HAPROXY_LB_PORT}:8083"
      - "${HAPROXY_STATS_PORT}:8404"
      - "${HAPROXY_HTTPS_PORT}:443"
    networks:
      - ${NETWORK_NAME}
    depends_on:
      - weblogic-a
      - weblogic-b
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8404/stats"]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
      start_period: 30s
    restart: unless-stopped
    labels:
      - "application=haproxy-advanced"
      - "environment=${DEPLOY_ENVIRONMENT}"

  # =============================================================================
  # Oracle Database Express
  # =============================================================================
  orcldb:
    image: ${ORACLE_IMAGE}
    container_name: orcldb
    environment:
      - ORACLE_PASSWORD=${ORACLE_PASSWORD}
      - ORACLE_CHARACTERSET=${ORACLE_CHARACTERSET}
    ports:
      - "${ORACLE_PORT}:1521"
      - "${ORACLE_EM_PORT}:5500"
    volumes:
      - ${DB_ORACLE_VOLUME}:/opt/oracle/oradata
    networks:
      - ${NETWORK_NAME}
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
      start_period: 120s
    restart: unless-stopped
    labels:
      - "application=oracle-database"
      - "environment=${DEPLOY_ENVIRONMENT}"

  # =============================================================================
  # MkDocs Documentation Server
  # =============================================================================
  mkdocs-server:
    build:
      context: ${BUILD_CONTEXT}
      dockerfile: ${DOCKERFILE_MKDOCS}
      platforms:
        - ${DOCKER_PLATFORM}
    image: ${MKDOCS_IMAGE}
    container_name: mkdocs-server
    environment:
      - MKDOCS_DEV_ADDR=${MKDOCS_DEV_ADDR}
    ports:
      - "${MKDOCS_PORT}:8000"
    volumes:
      - ../docs:/app/docs
      - ../applications/mkdocs-documentation/mkdocs.yml:/app/mkdocs.yml
    networks:
      - ${NETWORK_NAME}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: ${HEALTH_CHECK_INTERVAL}
      timeout: ${HEALTH_CHECK_TIMEOUT}
      retries: ${HEALTH_CHECK_RETRIES}
      start_period: 30s
    restart: unless-stopped
    labels:
      - "application=mkdocs-server"
      - "environment=${DEPLOY_ENVIRONMENT}"

# =============================================================================
# Networks
# =============================================================================
networks:
  weblogic-network:
    name: ${NETWORK_NAME}
    driver: ${NETWORK_DRIVER}
    ipam:
      config:
        - subnet: ${NETWORK_SUBNET}

# =============================================================================
# Volumes
# =============================================================================
volumes:
  db-oracle:
    name: ${DB_ORACLE_VOLUME}
    driver: local
  
  weblogic-a-logs:
    name: ${WEBLOGIC_A_LOGS_VOLUME}
    driver: local
  
  weblogic-b-logs:
    name: ${WEBLOGIC_B_LOGS_VOLUME}
    driver: local
  
  weblogic-a-monitoring:
    name: ${WEBLOGIC_A_MONITORING_VOLUME}
    driver: local
  
  weblogic-b-monitoring:
    name: ${WEBLOGIC_B_MONITORING_VOLUME}
    driver: local
