# =============================================================================
# HAProxy Advanced Configuration - WebLogic Load Balancer
# Configuración completa con interfaces avanzadas
# =============================================================================

global
    daemon
    log stdout local0 info
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    
    # SSL Configuration
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option log-health-checks
    option forwardfor
    option http-server-close
    timeout connect 5000
    timeout client 50000
    timeout server 50000
    retries 3
    
    # Error pages
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

# =============================================================================
# Frontend - Main Load Balancer Entry Point
# =============================================================================
frontend weblogic_frontend
    bind *:80
    bind *:443 ssl crt /etc/ssl/certs/haproxy.pem
    
    # Security headers
    http-response set-header X-Frame-Options DENY
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-XSS-Protection "1; mode=block"
    
    # Redirect HTTP to HTTPS
    redirect scheme https if !{ ssl_fc }
    
    # Health check endpoint
    acl health_check path_beg /health
    http-request return status 200 content-type text/plain string "HAProxy Advanced OK" if health_check
    
    # Load balancing rules
    acl is_weblogic_a hdr(host) -i weblogic-a.local
    acl is_weblogic_b hdr(host) -i weblogic-b.local
    
    # Route to specific backend if requested
    use_backend weblogic_a_backend if is_weblogic_a
    use_backend weblogic_b_backend if is_weblogic_b
    
    # Default backend (load balanced)
    default_backend weblogic_backend

# =============================================================================
# Backend - WebLogic Load Balanced
# =============================================================================
backend weblogic_backend
    balance roundrobin
    option httpchk GET /console
    http-check expect status 200,302,401
    
    # Advanced health check
    option log-health-checks
    
    # WebLogic Server A
    server weblogic-a weblogic-a:7001 check inter 30s rise 2 fall 3 weight 100
    
    # WebLogic Server B
    server weblogic-b weblogic-b:7001 check inter 30s rise 2 fall 3 weight 100

# =============================================================================
# Backend - WebLogic A Only
# =============================================================================
backend weblogic_a_backend
    option httpchk GET /console
    http-check expect status 200,302,401
    server weblogic-a weblogic-a:7001 check inter 30s rise 2 fall 3

# =============================================================================
# Backend - WebLogic B Only
# =============================================================================
backend weblogic_b_backend
    option httpchk GET /console
    http-check expect status 200,302,401
    server weblogic-b weblogic-b:7001 check inter 30s rise 2 fall 3

# =============================================================================
# Statistics Interface - Advanced
# =============================================================================
frontend stats_frontend
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 30s
    stats admin if TRUE
    stats show-legends
    stats show-node
    stats show-desc "HAProxy Advanced Load Balancer for WebLogic"
    
    # Custom CSS for better appearance
    stats realm "HAProxy Advanced Statistics"
    stats auth admin:admin123
    
    # Additional stats endpoints
    acl stats_csv path_end ;csv
    http-request return status 200 content-type text/plain if stats_csv

# =============================================================================
# Admin API Interface - Advanced
# =============================================================================
frontend admin_api_frontend
    bind *:8082
    
    # CORS headers for API
    http-response set-header Access-Control-Allow-Origin "*"
    http-response set-header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
    http-response set-header Access-Control-Allow-Headers "Content-Type, Authorization"
    
    # Route to Python API backend
    default_backend admin_api_backend

backend admin_api_backend
    server api_server 127.0.0.1:8082 check

# =============================================================================
# Admin UI Interface - Advanced
# =============================================================================
frontend admin_ui_frontend
    bind *:8084
    
    # Route to Python UI backend
    default_backend admin_ui_backend

backend admin_ui_backend
    server ui_server 127.0.0.1:8084 check

# =============================================================================
# Monitoring and Logging
# =============================================================================
listen monitoring
    bind *:8085
    stats enable
    stats uri /monitor
    stats refresh 10s
    stats show-legends
    stats realm "HAProxy Monitoring"
    
    # JSON stats endpoint
    acl json_stats path /json
    http-request return status 200 content-type application/json string '{"status":"ok","timestamp":"{{ date }}"}' if json_stats
