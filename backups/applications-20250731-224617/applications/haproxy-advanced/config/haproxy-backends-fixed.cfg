global
    daemon
    maxconn 4096
    log stdout local0
    stats socket /var/run/haproxy.sock mode 600 level admin

defaults
    mode http
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    timeout check 3000ms
    option httplog
    option dontlognull
    option log-health-checks
    retries 3

# ===================================================================
# FRONTENDS - PUNTOS DE ENTRADA
# ===================================================================

# Frontend HTTP principal
frontend weblogic_frontend
    bind *:80
    
    # Logging y captura de headers
    capture request header Host len 32
    capture request header User-Agent len 64
    capture request header X-Forwarded-For len 64
    
    # Headers de seguridad
    http-response set-header X-Frame-Options DENY
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-XSS-Protection "1; mode=block"
    
    # Rate limiting básico
    stick-table type ip size 100k expire 30s store http_req_rate(10s)
    http-request track-sc0 src
    http-request deny if { sc_http_req_rate(0) gt 20 }
    
    # === ROUTING DE DOCUMENTACIÓN ===
    acl is_docs path_beg /docs
    acl is_docs_dev path_beg /docs/dev
    acl is_docs_v1 path_beg /docs/v1
    acl is_docs_api path_beg /docs/api
    
    use_backend mkdocs_main if is_docs
    use_backend mkdocs_dev if is_docs_dev
    use_backend mkdocs_v1 if is_docs_v1
    use_backend mkdocs_api if is_docs_api
    
    # === ROUTING DE APLICACIONES ===
    acl is_health path_beg /health
    acl is_admin path_beg /admin
    acl is_console path_beg /console
    acl is_api path_beg /api
    acl is_static path_beg /static /css /js /images
    
    # Routing especializado
    use_backend health_check if is_health
    use_backend weblogic_admin if is_admin
    use_backend weblogic_console if is_console
    use_backend weblogic_api if is_api
    use_backend weblogic_static if is_static
    
    # Canary deployment (5% del tráfico)
    acl canary_traffic rand(100) lt 5
    use_backend weblogic_canary if canary_traffic
    
    # Default backend
    default_backend weblogic_main

# Frontend HTTPS (sin SSL por ahora)
frontend weblogic_https_frontend
    bind *:8443
    
    # Headers HTTPS
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Forwarded-Port 8443
    
    # Headers de seguridad
    http-response set-header X-Frame-Options DENY
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-XSS-Protection "1; mode=block"
    
    # Mismo routing que HTTP
    acl is_docs path_beg /docs
    acl is_docs_dev path_beg /docs/dev
    acl is_docs_v1 path_beg /docs/v1
    acl is_docs_api path_beg /docs/api
    acl is_health path_beg /health
    acl is_admin path_beg /admin
    acl is_console path_beg /console
    acl is_api path_beg /api
    acl is_static path_beg /static /css /js /images
    
    use_backend mkdocs_main if is_docs
    use_backend mkdocs_dev if is_docs_dev
    use_backend mkdocs_v1 if is_docs_v1
    use_backend mkdocs_api if is_docs_api
    use_backend health_check if is_health
    use_backend weblogic_admin if is_admin
    use_backend weblogic_console if is_console
    use_backend weblogic_api if is_api
    use_backend weblogic_static if is_static
    
    # Canary deployment
    acl canary_traffic rand(100) lt 5
    use_backend weblogic_canary if canary_traffic
    
    default_backend weblogic_main

# ===================================================================
# BACKENDS DE DOCUMENTACIÓN
# ===================================================================

# Documentación principal (producción)
backend mkdocs_main
    balance roundrobin
    option httpchk GET /
    
    # Configuración de cache
    http-request set-path %[path,regsub(^/docs,/)]
    http-response set-header Cache-Control "public, max-age=3600"
    http-response set-header X-Content-Type-Options nosniff
    
    # Servidor principal
    server mkdocs-prod mkdocs-server:8000 check inter 10s rise 2 fall 3

# Documentación desarrollo (sin cache)
backend mkdocs_dev
    balance roundrobin
    option httpchk GET /
    
    http-request set-path %[path,regsub(^/docs/dev,/)]
    http-response set-header Cache-Control "no-cache, no-store, must-revalidate"
    http-response set-header Pragma "no-cache"
    http-response set-header Expires "0"
    
    server mkdocs-dev mkdocs-server:8000 check inter 5s rise 1 fall 2

# Documentación versionada v1
backend mkdocs_v1
    balance roundrobin
    option httpchk GET /
    
    http-request set-path %[path,regsub(^/docs/v1,/)]
    http-response set-header Cache-Control "public, max-age=86400"
    
    server mkdocs-v1 mkdocs-server:8000 check inter 30s rise 2 fall 3

# Documentación API
backend mkdocs_api
    balance roundrobin
    option httpchk GET /
    
    http-request set-path %[path,regsub(^/docs/api,/)]
    http-response set-header Cache-Control "public, max-age=1800"
    
    server mkdocs-api mkdocs-server:8000 check inter 15s rise 2 fall 3

# ===================================================================
# BACKENDS DE APLICACIONES WEBLOGIC
# ===================================================================

# Backend principal WebLogic (Producción)
backend weblogic_main
    balance roundrobin
    option httpchk GET /console/login/LoginForm.jsp
    
    # Configuración de cookies para sesiones
    cookie JSESSIONID prefix nocache
    
    # Headers para aplicaciones
    http-request set-header X-Forwarded-For %[src]
    http-request set-header X-Real-IP %[src]
    
    # Servidores WebLogic principales - IPs actualizadas automáticamente
    server weblogic-a 172.19.0.4:7001 check inter 10s rise 3 fall 2 cookie weblogic-a
    server weblogic-b 172.19.0.5:7001 check inter 10s rise 3 fall 2 cookie weblogic-b

# Backend para administración WebLogic
backend weblogic_admin
    balance source
    option httpchk GET /console/login/LoginForm.jsp
    
    # Sticky sessions para administración
    cookie ADMINID insert indirect nocache
    
    # Timeout más largo para operaciones administrativas
    timeout server 120s
    
    server weblogic-admin-a 172.19.0.4:7001 check inter 15s rise 2 fall 3 cookie admin-a
    server weblogic-admin-b 172.19.0.5:7001 check inter 15s rise 2 fall 3 cookie admin-b backup

# Backend para consola WebLogic
backend weblogic_console
    balance source
    option httpchk GET /console/login/LoginForm.jsp
    
    # Configuración específica para consola
    cookie CONSOLEID insert indirect nocache
    timeout server 60s
    
    server weblogic-console-a 172.19.0.4:7001 check inter 10s rise 2 fall 3 cookie console-a
    server weblogic-console-b 172.19.0.5:7001 check inter 10s rise 2 fall 3 cookie console-b

# Backend para APIs WebLogic
backend weblogic_api
    balance leastconn
    option httpchk GET /api/health
    
    # Configuración optimizada para APIs
    http-request set-header X-API-Gateway "HAProxy"
    http-response set-header X-Response-Time %Tr
    
    # Timeout más corto para APIs
    timeout server 30s
    
    server weblogic-api-a 172.19.0.4:7001 check inter 5s rise 2 fall 2 weight 100
    server weblogic-api-b 172.19.0.5:7001 check inter 5s rise 2 fall 2 weight 100

# Backend para contenido estático
backend weblogic_static
    balance roundrobin
    option httpchk GET /static/health.txt
    
    # Configuración optimizada para estáticos
    http-response set-header Cache-Control "public, max-age=31536000"
    http-response set-header Expires "Thu, 31 Dec 2025 23:59:59 GMT"
    
    # Timeout más corto para estáticos
    timeout server 10s
    
    server weblogic-static-a 172.19.0.4:7001 check inter 30s rise 1 fall 2
    server weblogic-static-b 172.19.0.5:7001 check inter 30s rise 1 fall 2

# Backend Canary (para deployments graduales)
backend weblogic_canary
    balance roundrobin
    option httpchk GET /console/login/LoginForm.jsp
    
    # Headers especiales para canary
    http-request set-header X-Deployment-Type "canary"
    http-response set-header X-Server-Type "canary"
    
    # Solo un servidor para canary inicialmente
    server weblogic-canary-a 172.19.0.4:7001 check inter 5s rise 2 fall 1 weight 50

# ===================================================================
# BACKENDS DE UTILIDAD
# ===================================================================

# Backend de emergencia (maintenance mode)
backend maintenance_mode
    http-request return status 503 content-type text/html string "Sistema en Mantenimiento - Intente mas tarde"

# Backend de health check
backend health_check
    http-request return status 200 content-type application/json string "{\"status\":\"healthy\",\"service\":\"HAProxy\"}"

# ===================================================================
# INTERFACES DE ADMINISTRACIÓN
# ===================================================================

# Stats interface con autenticación
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 30s
    stats admin if TRUE
    stats show-desc "WebLogic Advanced Load Balancer"
    stats auth admin:admin123
    
    # Información adicional en stats
    stats show-legends
    stats show-node

# API de administración
listen api
    bind *:8083
    stats enable
    stats uri /
    stats refresh 5s
    stats admin if TRUE
    stats show-desc "HAProxy Management API"
    stats realm "HAProxy Management"
