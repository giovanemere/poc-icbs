site_name: Docker WebLogic Oracle - Documentación
site_description: Documentación completa del proyecto Docker WebLogic Oracle con Feature Flags
site_author: DevOps Team
site_url: http://localhost:8000

# Repository
repo_name: docker-for-oracle-weblogic
repo_url: https://github.com/edissonz8809/docker-for-oracle-weblogic

# Configuration
theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: blue
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

# Extensions
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg

# Plugins
plugins:
  - search:
      lang: es
  - git-revision-date-localized:
      type: date
      locale: es
  - minify:
      minify_html: true
  - awesome-pages
  - macros

# Navigation
nav:
  - Inicio: index.md
  - Arquitectura:
    - Visión General: arquitectura/vision-general.md
    - Componentes: arquitectura/componentes.md
    - Diagramas: arquitectura/diagramas.md
  - Instalación:
    - Requisitos: instalacion/requisitos.md
    - Guía Rápida: instalacion/guia-rapida.md
    - Configuración: instalacion/configuracion.md
  - Aplicaciones:
    - WebLogic: aplicaciones/weblogic.md
    - HAProxy: aplicaciones/haproxy.md
    - Oracle DB: aplicaciones/oracle.md
    - MkDocs: aplicaciones/mkdocs.md
  - Docker:
    - Imágenes: docker/imagenes.md
    - Compose: docker/compose.md
    - Registry: docker/registry.md
  - Scripts:
    - Automatización: scripts/automatizacion.md
    - Deployment: scripts/deployment.md
    - Utilidades: scripts/utilidades.md
  - Monitoreo:
    - Health Checks: monitoreo/health-checks.md
    - Logs: monitoreo/logs.md
    - Métricas: monitoreo/metricas.md
  - Troubleshooting:
    - Problemas Comunes: troubleshooting/problemas-comunes.md
    - Debugging: troubleshooting/debugging.md
    - FAQ: troubleshooting/faq.md
  - API Reference:
    - WebLogic API: api/weblogic.md
    - HAProxy API: api/haproxy.md
    - Feature Flags: api/feature-flags.md

# Extra
extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/repositories/edissonz8809
    - icon: fontawesome/brands/github
      link: https://github.com/edissonz8809
  analytics:
    provider: google
    property: G-XXXXXXXXXX

