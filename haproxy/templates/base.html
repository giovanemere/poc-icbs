<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Panel de Administración HAProxy{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <style>
        .sidebar {
            min-height: 100vh;
            background-color: #343a40;
            color: white;
        }
        
        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.8);
        }
        
        .sidebar .nav-link:hover {
            color: white;
        }
        
        .sidebar .nav-link.active {
            color: white;
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        .main-content {
            padding: 20px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        
        .status-up {
            background-color: #28a745;
        }
        
        .status-down {
            background-color: #dc3545;
        }
        
        .status-warning {
            background-color: #ffc107;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 d-md-block sidebar collapse">
                <div class="position-sticky pt-3">
                    <div class="text-center mb-4">
                        <h4>HAProxy Admin</h4>
                    </div>
                    
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                                <i class="fas fa-tachometer-alt me-2"></i>
                                Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/ab-testing' %}active{% endif %}" href="/ab-testing">
                                <i class="fas fa-flask me-2"></i>
                                Testing A/B
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/canary' %}active{% endif %}" href="/canary">
                                <i class="fas fa-dove me-2"></i>
                                Canary Deployment
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/server-weights' %}active{% endif %}" href="/server-weights">
                                <i class="fas fa-balance-scale me-2"></i>
                                Pesos de Servidores
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/url-status' %}active{% endif %}" href="/url-status">
                                <i class="fas fa-link me-2"></i>
                                Estado de URLs
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/stats' %}active{% endif %}" href="/stats">
                                <i class="fas fa-chart-bar me-2"></i>
                                Estadísticas
                            </a>
                        </li>
                    </ul>
                    
                    <hr>
                    
                    <!-- Enlaces Externos -->
                    <div class="mb-3">
                        <h6 class="text-muted mb-2">Enlaces Externos</h6>
                        <ul class="nav flex-column">
                            <li class="nav-item">
                                <a class="nav-link" href="http://localhost:8000" target="_blank">
                                    <i class="fas fa-book me-2"></i>
                                    Documentación MkDocs
                                    <i class="fas fa-external-link-alt ms-1" style="font-size: 0.8em;"></i>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="http://localhost:8404/stats" target="_blank">
                                    <i class="fas fa-chart-line me-2"></i>
                                    HAProxy Stats
                                    <i class="fas fa-external-link-alt ms-1" style="font-size: 0.8em;"></i>
                                </a>
                            </li>
                        </ul>
                    </div>
                    
                    <hr>
                    
                    <div class="text-center mb-3">
                        <div id="api-status-indicator" class="status-indicator status-warning"></div>
                        <span id="api-status-text">Verificando API...</span>
                    </div>
                </div>
            </div>
            
            <!-- Main content -->
            <div class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Common scripts -->
    <script>
        // Verificar el estado de la API
        function checkApiStatus() {
            fetch('/api/check-api')
                .then(response => response.json())
                .then(data => {
                    const statusIndicator = document.getElementById('api-status-indicator');
                    const statusText = document.getElementById('api-status-text');
                    
                    if (data.status === 'ok') {
                        statusIndicator.className = 'status-indicator status-up';
                        statusText.textContent = 'API Conectada';
                    } else {
                        statusIndicator.className = 'status-indicator status-down';
                        statusText.textContent = 'API Desconectada';
                    }
                })
                .catch(error => {
                    const statusIndicator = document.getElementById('api-status-indicator');
                    const statusText = document.getElementById('api-status-text');
                    
                    statusIndicator.className = 'status-indicator status-down';
                    statusText.textContent = 'API Desconectada';
                });
        }
        
        // Verificar el estado de la API cada 30 segundos
        document.addEventListener('DOMContentLoaded', function() {
            checkApiStatus();
            setInterval(checkApiStatus, 30000);
        });
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
