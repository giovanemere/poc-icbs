<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Tráfico WebLogic A/B y Canary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            padding: 20px;
        }
        .card {
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            border: none;
        }
        .card-header {
            background-color: #343a40;
            color: white;
            border-radius: 10px 10px 0 0;
            padding: 15px 20px;
            font-weight: 600;
        }
        .status-badge {
            float: right;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .active {
            background-color: #28a745;
        }
        .inactive {
            background-color: #dc3545;
        }
        .chart-container {
            position: relative;
            height: 200px;
            width: 100%;
        }
        .traffic-control {
            margin-top: 15px;
        }
        .slider-container {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }
        .slider {
            flex-grow: 1;
            margin: 0 15px;
        }
        .percentage-display {
            width: 60px;
            text-align: center;
            font-weight: bold;
        }
        .server-status {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }
        .server-indicator {
            width: 48%;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }
        .server-active {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .server-inactive {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .requests-counter {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
        }
        .refresh-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .last-updated {
            font-size: 0.8rem;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">Dashboard de Tráfico WebLogic</h1>
        
        <div class="refresh-control">
            <div>
                <label for="refresh-interval">Intervalo de actualización:</label>
                <select id="refresh-interval" class="form-select form-select-sm d-inline-block w-auto">
                    <option value="2000">2 segundos</option>
                    <option value="5000" selected>5 segundos</option>
                    <option value="10000">10 segundos</option>
                    <option value="30000">30 segundos</option>
                </select>
                <button id="refresh-now" class="btn btn-sm btn-primary ms-2">Actualizar ahora</button>
            </div>
            <div class="last-updated">
                Última actualización: <span id="last-updated-time">-</span>
            </div>
        </div>
        
        <div class="row">
            <!-- A/B Testing Card -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        Testing A/B
                        <span id="ab-status" class="status-badge inactive">Inactivo</span>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="abChart"></canvas>
                        </div>
                        <div class="traffic-control">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="ab-toggle">
                                <label class="form-check-label" for="ab-toggle">Activar Testing A/B</label>
                            </div>
                            <div class="slider-container">
                                <span>Version A</span>
                                <input type="range" class="form-range slider" id="ab-slider" min="0" max="100" value="50" disabled>
                                <span>Version B</span>
                                <div class="percentage-display" id="ab-percentage">50%</div>
                            </div>
                        </div>
                        <div class="server-status">
                            <div id="version-a-status" class="server-indicator server-active">
                                <div>Version A</div>
                                <div class="requests-counter" id="version-a-requests">0</div>
                                <div>peticiones</div>
                            </div>
                            <div id="version-b-status" class="server-indicator server-inactive">
                                <div>Version B</div>
                                <div class="requests-counter" id="version-b-requests">0</div>
                                <div>peticiones</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Canary Deployment Card -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        Despliegue Canary
                        <span id="canary-status" class="status-badge inactive">Inactivo</span>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="canaryChart"></canvas>
                        </div>
                        <div class="traffic-control">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="canary-toggle">
                                <label class="form-check-label" for="canary-toggle">Activar Despliegue Canary</label>
                            </div>
                            <div class="slider-container">
                                <span>WebLogic A</span>
                                <input type="range" class="form-range slider" id="canary-slider" min="0" max="100" value="10" disabled>
                                <span>WebLogic B</span>
                                <div class="percentage-display" id="canary-percentage">10%</div>
                            </div>
                        </div>
                        <div class="server-status">
                            <div id="weblogic-a-status" class="server-indicator server-active">
                                <div>WebLogic A</div>
                                <div class="requests-counter" id="weblogic-a-requests">0</div>
                                <div>peticiones</div>
                            </div>
                            <div id="weblogic-b-status" class="server-indicator server-inactive">
                                <div>WebLogic B</div>
                                <div class="requests-counter" id="weblogic-b-requests">0</div>
                                <div>peticiones</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Traffic History Card -->
        <div class="card">
            <div class="card-header">
                Historial de Tráfico
            </div>
            <div class="card-body">
                <div style="height: 300px;">
                    <canvas id="trafficHistoryChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuración de gráficos
        const abChartCtx = document.getElementById('abChart').getContext('2d');
        const canaryChartCtx = document.getElementById('canaryChart').getContext('2d');
        const historyChartCtx = document.getElementById('trafficHistoryChart').getContext('2d');
        
        // Colores
        const colors = {
            versionA: 'rgba(54, 162, 235, 0.8)',
            versionB: 'rgba(255, 99, 132, 0.8)',
            weblogicA: 'rgba(75, 192, 192, 0.8)',
            weblogicB: 'rgba(255, 159, 64, 0.8)'
        };
        
        // Crear gráficos
        const abChart = new Chart(abChartCtx, {
            type: 'doughnut',
            data: {
                labels: ['Version A', 'Version B'],
                datasets: [{
                    data: [100, 0],
                    backgroundColor: [colors.versionA, colors.versionB],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom'
                    }
                }
            }
        });
        
        const canaryChart = new Chart(canaryChartCtx, {
            type: 'doughnut',
            data: {
                labels: ['WebLogic A', 'WebLogic B'],
                datasets: [{
                    data: [100, 0],
                    backgroundColor: [colors.weblogicA, colors.weblogicB],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom'
                    }
                }
            }
        });
        
        // Historial de tráfico (últimas 10 muestras)
        const timeLabels = Array(10).fill('').map((_, i) => `${i}`);
        const trafficHistoryChart = new Chart(historyChartCtx, {
            type: 'line',
            data: {
                labels: timeLabels,
                datasets: [
                    {
                        label: 'Version A',
                        data: Array(10).fill(0),
                        borderColor: colors.versionA,
                        backgroundColor: 'transparent',
                        tension: 0.4
                    },
                    {
                        label: 'Version B',
                        data: Array(10).fill(0),
                        borderColor: colors.versionB,
                        backgroundColor: 'transparent',
                        tension: 0.4
                    },
                    {
                        label: 'WebLogic A',
                        data: Array(10).fill(0),
                        borderColor: colors.weblogicA,
                        backgroundColor: 'transparent',
                        tension: 0.4
                    },
                    {
                        label: 'WebLogic B',
                        data: Array(10).fill(0),
                        borderColor: colors.weblogicB,
                        backgroundColor: 'transparent',
                        tension: 0.4
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: 'Peticiones'
                        }
                    },
                    x: {
                        title: {
                            display: true,
                            text: 'Tiempo'
                        }
                    }
                },
                plugins: {
                    legend: {
                        position: 'bottom'
                    }
                }
            }
        });
        
        // Variables para almacenar contadores históricos
        let versionAHistory = Array(10).fill(0);
        let versionBHistory = Array(10).fill(0);
        let weblogicAHistory = Array(10).fill(0);
        let weblogicBHistory = Array(10).fill(0);
        
        // Elementos DOM
        const abToggle = document.getElementById('ab-toggle');
        const canaryToggle = document.getElementById('canary-toggle');
        const abSlider = document.getElementById('ab-slider');
        const canarySlider = document.getElementById('canary-slider');
        const abPercentage = document.getElementById('ab-percentage');
        const canaryPercentage = document.getElementById('canary-percentage');
        const refreshInterval = document.getElementById('refresh-interval');
        const refreshNow = document.getElementById('refresh-now');
        const lastUpdatedTime = document.getElementById('last-updated-time');
        
        // Event listeners
        abToggle.addEventListener('change', function() {
            abSlider.disabled = !this.checked;
            updateABStatus(this.checked, parseInt(abSlider.value));
        });
        
        canaryToggle.addEventListener('change', function() {
            canarySlider.disabled = !this.checked;
            updateCanaryStatus(this.checked, parseInt(canarySlider.value));
        });
        
        abSlider.addEventListener('input', function() {
            abPercentage.textContent = `${this.value}%`;
            updateABChart(parseInt(this.value));
        });
        
        abSlider.addEventListener('change', function() {
            if (abToggle.checked) {
                updateABStatus(true, parseInt(this.value));
            }
        });
        
        canarySlider.addEventListener('input', function() {
            canaryPercentage.textContent = `${this.value}%`;
            updateCanaryChart(parseInt(this.value));
        });
        
        canarySlider.addEventListener('change', function() {
            if (canaryToggle.checked) {
                updateCanaryStatus(true, parseInt(this.value));
            }
        });
        
        refreshNow.addEventListener('click', fetchData);
        
        refreshInterval.addEventListener('change', function() {
            clearInterval(dataInterval);
            dataInterval = setInterval(fetchData, parseInt(this.value));
        });
        
        // Funciones para actualizar gráficos
        function updateABChart(percentage) {
            abChart.data.datasets[0].data = [100 - percentage, percentage];
            abChart.update();
        }
        
        function updateCanaryChart(percentage) {
            canaryChart.data.datasets[0].data = [100 - percentage, percentage];
            canaryChart.update();
        }
        
        // Funciones para actualizar estado
        function updateABStatus(enabled, percentage) {
            const status = document.getElementById('ab-status');
            const versionAStatus = document.getElementById('version-a-status');
            const versionBStatus = document.getElementById('version-b-status');
            
            if (enabled) {
                status.textContent = 'Activo';
                status.classList.remove('inactive');
                status.classList.add('active');
                
                versionAStatus.classList.add('server-active');
                versionBStatus.classList.add('server-active');
                versionBStatus.classList.remove('server-inactive');
                
                // Enviar solicitud para activar A/B testing
                fetch('/api/ab/enable', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ percentage: percentage })
                }).catch(error => console.error('Error:', error));
            } else {
                status.textContent = 'Inactivo';
                status.classList.remove('active');
                status.classList.add('inactive');
                
                versionBStatus.classList.remove('server-active');
                versionBStatus.classList.add('server-inactive');
                
                // Enviar solicitud para desactivar A/B testing
                fetch('/api/ab/disable', {
                    method: 'POST'
                }).catch(error => console.error('Error:', error));
            }
        }
        
        function updateCanaryStatus(enabled, percentage) {
            const status = document.getElementById('canary-status');
            const weblogicAStatus = document.getElementById('weblogic-a-status');
            const weblogicBStatus = document.getElementById('weblogic-b-status');
            
            if (enabled) {
                status.textContent = 'Activo';
                status.classList.remove('inactive');
                status.classList.add('active');
                
                weblogicAStatus.classList.add('server-active');
                weblogicBStatus.classList.add('server-active');
                weblogicBStatus.classList.remove('server-inactive');
                
                // Enviar solicitud para activar Canary
                fetch('/api/canary/enable', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ percentage: percentage })
                }).catch(error => console.error('Error:', error));
            } else {
                status.textContent = 'Inactivo';
                status.classList.remove('active');
                status.classList.add('inactive');
                
                weblogicBStatus.classList.remove('server-active');
                weblogicBStatus.classList.add('server-inactive');
                
                // Enviar solicitud para desactivar Canary
                fetch('/api/canary/disable', {
                    method: 'POST'
                }).catch(error => console.error('Error:', error));
            }
        }
        
        // Función para obtener datos
        function fetchData() {
            // En un entorno real, esto obtendría datos de la API
            // Aquí simulamos datos para la demostración
            fetch('/api/stats')
                .then(response => response.json())
                .then(data => {
                    // Actualizar estado de A/B testing
                    abToggle.checked = data.ab.enabled;
                    abSlider.disabled = !data.ab.enabled;
                    abSlider.value = data.ab.percentage;
                    abPercentage.textContent = `${data.ab.percentage}%`;
                    updateABChart(data.ab.percentage);
                    updateABStatus(data.ab.enabled, data.ab.percentage);
                    
                    // Actualizar estado de Canary
                    canaryToggle.checked = data.canary.enabled;
                    canarySlider.disabled = !data.canary.enabled;
                    canarySlider.value = data.canary.percentage;
                    canaryPercentage.textContent = `${data.canary.percentage}%`;
                    updateCanaryChart(data.canary.percentage);
                    updateCanaryStatus(data.canary.enabled, data.canary.percentage);
                    
                    // Actualizar contadores de peticiones
                    document.getElementById('version-a-requests').textContent = data.requests.versionA;
                    document.getElementById('version-b-requests').textContent = data.requests.versionB;
                    document.getElementById('weblogic-a-requests').textContent = data.requests.weblogicA;
                    document.getElementById('weblogic-b-requests').textContent = data.requests.weblogicB;
                    
                    // Actualizar historial
                    versionAHistory.shift();
                    versionAHistory.push(data.requests.versionA);
                    
                    versionBHistory.shift();
                    versionBHistory.push(data.requests.versionB);
                    
                    weblogicAHistory.shift();
                    weblogicAHistory.push(data.requests.weblogicA);
                    
                    weblogicBHistory.shift();
                    weblogicBHistory.push(data.requests.weblogicB);
                    
                    // Actualizar gráfico de historial
                    trafficHistoryChart.data.datasets[0].data = versionAHistory;
                    trafficHistoryChart.data.datasets[1].data = versionBHistory;
                    trafficHistoryChart.data.datasets[2].data = weblogicAHistory;
                    trafficHistoryChart.data.datasets[3].data = weblogicBHistory;
                    trafficHistoryChart.update();
                    
                    // Actualizar hora de última actualización
                    const now = new Date();
                    lastUpdatedTime.textContent = now.toLocaleTimeString();
                })
                .catch(error => {
                    console.error('Error al obtener datos:', error);
                    // Simular datos para demostración
                    simulateData();
                });
        }
        
        // Función para simular datos (para demostración)
        function simulateData() {
            const abEnabled = Math.random() > 0.5;
            const canaryEnabled = Math.random() > 0.5;
            const abPercentage = Math.floor(Math.random() * 100);
            const canaryPercentage = Math.floor(Math.random() * 100);
            
            const versionA = Math.floor(Math.random() * 1000);
            const versionB = abEnabled ? Math.floor(Math.random() * 1000) : 0;
            const weblogicA = Math.floor(Math.random() * 1000);
            const weblogicB = canaryEnabled ? Math.floor(Math.random() * 1000) : 0;
            
            // Actualizar estado de A/B testing
            abToggle.checked = abEnabled;
            abSlider.disabled = !abEnabled;
            abSlider.value = abPercentage;
            abPercentage.textContent = `${abPercentage}%`;
            updateABChart(abPercentage);
            updateABStatus(abEnabled, abPercentage);
            
            // Actualizar estado de Canary
            canaryToggle.checked = canaryEnabled;
            canarySlider.disabled = !canaryEnabled;
            canarySlider.value = canaryPercentage;
            canaryPercentage.textContent = `${canaryPercentage}%`;
            updateCanaryChart(canaryPercentage);
            updateCanaryStatus(canaryEnabled, canaryPercentage);
            
            // Actualizar contadores de peticiones
            document.getElementById('version-a-requests').textContent = versionA;
            document.getElementById('version-b-requests').textContent = versionB;
            document.getElementById('weblogic-a-requests').textContent = weblogicA;
            document.getElementById('weblogic-b-requests').textContent = weblogicB;
            
            // Actualizar historial
            versionAHistory.shift();
            versionAHistory.push(versionA);
            
            versionBHistory.shift();
            versionBHistory.push(versionB);
            
            weblogicAHistory.shift();
            weblogicAHistory.push(weblogicA);
            
            weblogicBHistory.shift();
            weblogicBHistory.push(weblogicB);
            
            // Actualizar gráfico de historial
            trafficHistoryChart.data.datasets[0].data = versionAHistory;
            trafficHistoryChart.data.datasets[1].data = versionBHistory;
            trafficHistoryChart.data.datasets[2].data = weblogicAHistory;
            trafficHistoryChart.data.datasets[3].data = weblogicBHistory;
            trafficHistoryChart.update();
            
            // Actualizar hora de última actualización
            const now = new Date();
            lastUpdatedTime.textContent = now.toLocaleTimeString();
        }
        
        // Iniciar intervalo de actualización
        let dataInterval = setInterval(fetchData, 5000);
        
        // Cargar datos iniciales
        fetchData();
    </script>
</body>
</html>
