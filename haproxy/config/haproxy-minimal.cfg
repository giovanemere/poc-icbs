global
    daemon
    maxconn 4096
    log stdout local0
    stats socket /var/run/haproxy.sock mode 600 level admin

defaults
    mode http
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    option httplog
    option dontlognull
    retries 3

# Frontend HTTP - Punto de entrada principal
frontend weblogic_frontend
    bind *:80
    
    # Health check endpoint
    acl is_health path_beg /health
    use_backend health_check if is_health
    
    # Default response
    default_backend health_check

# Frontend HTTPS - Puerto seguro
frontend weblogic_https_frontend
    bind *:443 ssl crt /etc/ssl/certs/haproxy.pem
    
    # Health check endpoint
    acl is_health path_beg /health
    use_backend health_check if is_health
    
    # Default response
    default_backend health_check

# Health check endpoint
backend health_check
    http-request return status 200 content-type text/plain string "OK - HAProxy Load Balancer"

# === INTERFACES DE ADMINISTRACIÓN ===

# Stats interface
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 30s
    stats admin if TRUE
    stats show-desc "WebLogic + HAProxy Load Balancer"
    stats auth admin:admin123

# Admin UI interface
listen admin_ui
    bind *:8082
    stats enable
    stats uri /
    stats refresh 10s
    stats admin if TRUE
    stats show-desc "HAProxy Admin UI"
    stats auth admin:admin123

# API de administración - Puerto 8081
listen api_admin
    bind *:8081
    stats enable
    stats uri /api
    stats refresh 5s
    stats admin if TRUE
    stats show-desc "HAProxy API Interface"
    stats auth admin:admin123
