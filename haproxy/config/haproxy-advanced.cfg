global
    log stdout format raw local0
    maxconn 4096
    tune.ssl.default-dh-param 2048
    # Habilitar API de Runtime para permitir cambios dinámicos
    stats socket /var/run/haproxy.sock mode 666 level admin
    # Cargar módulos dinámicos Lua para routing avanzado
    lua-load /scripts/dynamic_routing.lua

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option forwardfor
    option http-server-close
    timeout connect 5s
    timeout client 50s
    timeout server 50s

# Frontend principal para HTTP traffic
frontend http-in
    bind *:80
    mode http
    
    # ACLs para identificar las rutas de las aplicaciones
    acl path_ff4j path_beg /ff4j-simple
    acl path_feature_flags path_beg /feature-flags
    acl path_version_a path_beg /version-a
    acl path_version_b path_beg /version-b
    acl path_weblogic_features_a path_beg /weblogic-features-a
    acl path_weblogic_features_b path_beg /weblogic-features-b
    
    # ACLs dinámicas para testing A/B y Canary deployment
    # Canary deployment - basado en porcentaje configurable
    acl canary_percent rand(100) lt 20  # 20% del tráfico va a la versión B (configurable)
    
    # A/B testing - múltiples métodos de activación
    acl canary_user hdr(X-Canary) -i true
    acl canary_cookie cookie(canary) -i true
    acl ab_test_cookie cookie(ab_test) -i B
    
    # Headers para tracking y debugging
    http-request set-header X-Current-Weight str(100)
    http-request set-header X-Request-ID %[uuid()]
    
    # === DASHBOARD INTEGRADO ===
    # Enrutamiento para el dashboard de tráfico (servido como archivo estático)
    acl path_dashboard path_beg /dashboard
    http-request return status 200 content-type text/html file /dashboard/simple-dashboard.html if path_dashboard
    
    # === ENRUTAMIENTO DE APLICACIONES ESPECÍFICAS ===
    # Enrutamiento para ff4j-simple
    use_backend ff4j-backend if path_ff4j
    
    # Enrutamiento para feature-flags
    use_backend feature-flags-backend if path_feature_flags
    
    # Enrutamiento para version-a y version-b (rutas específicas)
    use_backend version-a-backend if path_version_a
    use_backend version-b-backend if path_version_b
    
    # Enrutamiento para weblogic-features con rutas específicas
    use_backend weblogic-features-b if path_weblogic_features_b
    use_backend weblogic-features-a if path_weblogic_features_a
    
    # === REGLAS DE A/B TESTING Y CANARY PARA RUTAS GENÉRICAS ===
    # Estas reglas se aplican a todas las rutas que NO coincidan con las específicas anteriores
    # Esto permite que A/B testing y Canary funcionen para cualquier aplicación
    use_backend version-b-backend if !path_version_a !path_version_b !path_weblogic_features_a !path_weblogic_features_b !path_ff4j !path_feature_flags !path_dashboard canary_user
    use_backend version-b-backend if !path_version_a !path_version_b !path_weblogic_features_a !path_weblogic_features_b !path_ff4j !path_feature_flags !path_dashboard canary_cookie
    use_backend version-b-backend if !path_version_a !path_version_b !path_weblogic_features_a !path_weblogic_features_b !path_ff4j !path_feature_flags !path_dashboard ab_test_cookie
    use_backend version-b-backend if !path_version_a !path_version_b !path_weblogic_features_a !path_weblogic_features_b !path_ff4j !path_feature_flags !path_dashboard canary_percent
    
    # === CONFIGURACIÓN DE COOKIES PARA A/B TESTING ===
    # Establecer cookies automáticamente para mantener consistencia de experiencia
    http-response set-header Set-Cookie "ab_test=A; path=/; max-age=3600; HttpOnly" if !ab_test_cookie { rand(100) lt 50 }
    http-response set-header Set-Cookie "ab_test=B; path=/; max-age=3600; HttpOnly" if !ab_test_cookie { rand(100) ge 50 }
    
    # Headers adicionales para debugging y analytics
    http-response set-header X-Backend-Server %[res.hdr(Server)]
    http-response set-header X-Response-Time %Tr
    
    # Default backend - consola de WebLogic A
    default_backend weblogic-a

# === FRONTEND PARA HTTPS (OPCIONAL) ===
frontend https-in
    bind *:443 ssl crt /etc/ssl/certs/haproxy.pem
    mode http
    
    # Redirigir todo el tráfico HTTPS al frontend HTTP
    redirect scheme https if !{ ssl_fc }
    
    # Usar las mismas reglas que el frontend HTTP
    default_backend weblogic-a

# === STATS PAGE CON UI MEJORADA ===
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends
    stats show-node
    stats auth admin:admin123
    stats admin if TRUE
    stats hide-version
    
    # Personalización de la página de stats
    stats realm "HAProxy Statistics - WebLogic A/B Testing"
    stats show-desc "Sistema de Load Balancing con A/B Testing y Canary Deployment"

# === API DE ADMINISTRACIÓN ===
frontend management-api
    bind *:8081
    mode http
    
    # Proteger el acceso a la API (solo redes internas)
    acl authorized_management src 127.0.0.1 172.0.0.0/8 10.0.0.0/8
    http-request deny unless authorized_management
    
    # Headers de seguridad
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-Frame-Options DENY
    http-response set-header X-XSS-Protection "1; mode=block"
    
    # Endpoints para gestionar configuraciones de A/B y Canary
    use_backend management-backend

# === INTERFAZ WEB DE ADMINISTRACIÓN ===
frontend admin-ui
    bind *:8082
    mode http
    
    # Proteger el acceso a la UI (solo redes internas)
    acl authorized_ui src 127.0.0.1 172.0.0.0/8 10.0.0.0/8
    http-request deny unless authorized_ui
    
    # Headers de seguridad
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-Frame-Options SAMEORIGIN
    http-response set-header X-XSS-Protection "1; mode=block"
    
    # Servir la interfaz de administración
    use_backend admin-ui-backend

# ========================================
# BACKENDS CONFIGURATION
# ========================================

# Backend para la API de administración
backend management-backend
    mode http
    balance roundrobin
    option httpchk GET /api/health
    http-check expect status 200
    default-server inter 5s fall 2 rise 2
    server management-api 127.0.0.1:8081 check

# Backend para la interfaz web de administración
backend admin-ui-backend
    mode http
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    default-server inter 5s fall 2 rise 2
    server admin-ui 127.0.0.1:8082 check

# === BACKENDS DE WEBLOGIC ===

# Backend para la consola de WebLogic A
backend weblogic-a
    balance roundrobin
    option httpchk GET /console
    http-check expect status 302  # WebLogic console returns 302 redirect
    default-server inter 3s fall 3 rise 2
    cookie JSESSIONID prefix nocache
    server weblogic-a weblogic-a:7001 check weight 100 cookie A

# Backend para la consola de WebLogic B
backend weblogic-b
    balance roundrobin
    option httpchk GET /console
    http-check expect status 302  # WebLogic console returns 302 redirect
    default-server inter 3s fall 3 rise 2
    cookie JSESSIONID prefix nocache
    server weblogic-b weblogic-b:7001 check weight 100 cookie B

# === BACKENDS DE APLICACIONES ===

# Backend para ff4j-simple
backend ff4j-backend
    balance roundrobin
    option httpchk GET /ff4j-simple/
    http-check expect status 200
    default-server inter 3s fall 3 rise 2
    # Servidor principal en WebLogic A, backup en WebLogic B
    server weblogic-a-ff4j weblogic-a:7001 check weight 100
    server weblogic-b-ff4j weblogic-b:7001 check backup weight 50

# Backend para feature-flags
backend feature-flags-backend
    balance roundrobin
    option httpchk GET /feature-flags/
    http-check expect status 200
    default-server inter 3s fall 3 rise 2
    # Servidor principal en WebLogic A, backup en WebLogic B
    server weblogic-a-feature weblogic-a:7001 check weight 100
    server weblogic-b-feature weblogic-b:7001 check backup weight 50

# === BACKENDS PARA A/B TESTING ===

# Backend para version-a (Testing A/B)
backend version-a-backend
    balance roundrobin
    option httpchk GET /version-a/
    http-check expect status 200
    default-server inter 3s fall 3 rise 2
    cookie SERVERID insert indirect nocache
    # Configuración de headers para tracking
    http-request set-header X-Backend-Version "A"
    http-response set-header X-Served-By "Version-A"
    server weblogic-a-version weblogic-a:7001 check cookie A weight 100

# Backend para version-b (Testing A/B)
backend version-b-backend
    balance roundrobin
    option httpchk GET /version-b/
    http-check expect status 200
    default-server inter 3s fall 3 rise 2
    cookie SERVERID insert indirect nocache
    # Configuración de headers para tracking
    http-request set-header X-Backend-Version "B"
    http-response set-header X-Served-By "Version-B"
    server weblogic-b-version weblogic-b:7001 check cookie B weight 100

# === BACKENDS PARA WEBLOGIC FEATURES ===

# Backend para weblogic-features versión A
backend weblogic-features-a
    balance roundrobin
    option httpchk GET /weblogic-features-a/
    http-check expect status 200
    default-server inter 3s fall 3 rise 2
    cookie SERVERID insert indirect nocache
    # Headers para identificación de versión
    http-request set-header X-Feature-Version "A"
    http-response set-header X-Features-Backend "WebLogic-A"
    server weblogic-a-features weblogic-a:7001 check cookie A weight 100

# Backend para weblogic-features versión B
backend weblogic-features-b
    balance roundrobin
    option httpchk GET /weblogic-features-b/
    http-check expect status 200
    default-server inter 3s fall 3 rise 2
    cookie SERVERID insert indirect nocache
    # Headers para identificación de versión
    http-request set-header X-Feature-Version "B"
    http-response set-header X-Features-Backend "WebLogic-B"
    server weblogic-b-features weblogic-b:7001 check cookie B weight 100

# ========================================
