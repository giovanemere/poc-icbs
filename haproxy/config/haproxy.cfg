global
    log stdout format raw local0
    maxconn 4096

defaults
    log global
    mode http
    option httplog
    timeout connect 5s
    timeout client 50s
    timeout server 50s
    retries 3

# Frontend principal
frontend main_frontend
    bind *:80
    
    # ACLs para diferentes rutas
    acl is_root path /
    acl is_version_a path_beg /version-a
    acl is_version_b path_beg /version-b
    acl is_feature_flags path_beg /feature-flags
    acl is_ff4j path_beg /ff4j-simple
    acl is_weblogic_features path_beg /weblogic-features
    
    # Redirección de raíz a version-a
    redirect location /version-a/ if is_root
    
    # Routing a backends WebLogic
    use_backend weblogic_a if is_version_a
    use_backend weblogic_b if is_version_b
    use_backend weblogic_balanced if is_feature_flags
    use_backend weblogic_balanced if is_ff4j
    use_backend weblogic_a if is_weblogic_features
    
    # Default backend balanceado
    default_backend weblogic_balanced

# Backend WebLogic A
backend weblogic_a
    server weblogic-a weblogic-a-main:7001 check

# Backend WebLogic B  
backend weblogic_b
    server weblogic-b weblogic-b-main:7001 check

# Backend balanceado entre WebLogic A y B
backend weblogic_balanced
    balance roundrobin
    server weblogic-a weblogic-a-main:7001 check weight 50
    server weblogic-b weblogic-b-main:7001 check weight 50

# Backend de contenido estático (unified dashboard)
backend static_content
    server static unified-dashboard:80 check

# Estadísticas de HAProxy
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 30s
    stats admin if TRUE
    stats auth admin:admin123
