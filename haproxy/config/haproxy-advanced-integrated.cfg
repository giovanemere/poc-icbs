global
    log stdout format raw local0
    maxconn 4096
    tune.ssl.default-dh-param 2048
    # Habilitar API de Runtime para permitir cambios dinámicos
    stats socket /var/run/haproxy.sock mode 666 level admin
    # Cargar módulos dinámicos Lua para routing avanzado
    lua-load /scripts/dynamic_routing.lua

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option forwardfor
    option http-server-close
    timeout connect 5s
    timeout client 50s
    timeout server 50s

# Frontend principal para HTTP traffic
frontend http-in
    bind *:80
    mode http
    
    # ACLs para identificar las rutas de las aplicaciones
    acl path_ff4j path_beg /ff4j-simple
    acl path_feature_flags path_beg /feature-flags
    acl path_version_a path_beg /version-a
    acl path_version_b path_beg /version-b
    acl path_weblogic_features_a path_beg /weblogic-features-a
    acl path_weblogic_features_b path_beg /weblogic-features-b
    
    # ACLs para A/B testing y Canary deployment
    acl canary_user hdr_sub(User-Agent) -i canary
    acl canary_cookie hdr_sub(Cookie) -i canary=true
    acl ab_test_cookie hdr_sub(Cookie) -i ab_test=b
    acl canary_percent rand(100) lt 10
    
    # ACL para el dashboard de tráfico (servidor web dedicado)
    acl path_dashboard path_beg /dashboard
    use_backend dashboard-backend if path_dashboard
    
    # Enrutamiento para ff4j-simple
    use_backend ff4j-backend if path_ff4j
    
    # Enrutamiento para feature-flags
    use_backend feature-flags-backend if path_feature_flags
    
    # Enrutamiento para version-a y version-b
    use_backend version-a-backend if path_version_a
    use_backend version-b-backend if path_version_b
    
    # Enrutamiento para weblogic-features con A/B testing y Canary
    use_backend weblogic-features-b if path_weblogic_features_b
    
    # CORRECCIÓN: Aplicar reglas de A/B testing y Canary para rutas genéricas
    # Esto permite que las reglas de A/B y Canary funcionen para cualquier ruta
    use_backend version-b-backend if !path_version_a !path_version_b !path_weblogic_features_a !path_weblogic_features_b !path_ff4j !path_feature_flags canary_user
    use_backend version-b-backend if !path_version_a !path_version_b !path_weblogic_features_a !path_weblogic_features_b !path_ff4j !path_feature_flags canary_cookie
    use_backend version-b-backend if !path_version_a !path_version_b !path_weblogic_features_a !path_weblogic_features_b !path_ff4j !path_feature_flags ab_test_cookie
    use_backend version-b-backend if !path_version_a !path_version_b !path_weblogic_features_a !path_weblogic_features_b !path_ff4j !path_feature_flags canary_percent
    
    # Enrutamiento para weblogic-features-a después de las reglas de A/B y Canary
    use_backend weblogic-features-a if path_weblogic_features_a
    
    # Default a la consola de WebLogic
    default_backend weblogic-a

# Frontend para HTTPS traffic
frontend https-in
    bind *:443 ssl crt /etc/ssl/certs/haproxy.pem
    mode http
    redirect scheme https if !{ ssl_fc }
    
    # Usar las mismas reglas que HTTP
    use_backend dashboard-backend if { path_beg /dashboard }
    use_backend ff4j-backend if { path_beg /ff4j-simple }
    use_backend feature-flags-backend if { path_beg /feature-flags }
    use_backend version-a-backend if { path_beg /version-a }
    use_backend version-b-backend if { path_beg /version-b }
    use_backend weblogic-features-a if { path_beg /weblogic-features-a }
    use_backend weblogic-features-b if { path_beg /weblogic-features-b }
    
    default_backend weblogic-a

# Stats page con UI mejorada
listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 30s
    stats show-legends
    stats show-node
    stats admin if TRUE
    stats auth admin:admin123
    
    # Personalización de la interfaz
    stats realm HAProxy\ Statistics
    stats show-desc "HAProxy Load Balancer - WebLogic Cluster Integrado"

# Frontend para la API de administración
frontend api-frontend
    bind *:8081
    mode http
    
    # Endpoints para gestionar configuraciones de A/B y Canary
    use_backend management-backend

# Frontend para la UI de administración
frontend ui-frontend
    bind *:8082
    mode http
    
    # Servir la interfaz web de administración
    use_backend ui-backend

# Backend para la API de administración
backend management-backend
    mode http
    server management-api 127.0.0.1:8081

# Backend para la UI de administración
backend ui-backend
    mode http
    server ui-server 127.0.0.1:8082

# Backend para la consola de WebLogic A (INTEGRADO)
backend weblogic-a
    balance roundrobin
    option httpchk GET /console
    http-check expect status 302
    default-server inter 3s fall 3 rise 2
    server weblogic-a-integrated weblogic-a-integrated:7001 check weight 100

# Backend para la consola de WebLogic B (INTEGRADO)
backend weblogic-b
    balance roundrobin
    option httpchk GET /console
    http-check expect status 302
    default-server inter 3s fall 3 rise 2
    server weblogic-b-integrated weblogic-b-integrated:7001 check weight 100

# Backend para ff4j-simple (INTEGRADO)
backend ff4j-backend
    balance roundrobin
    default-server inter 5s fall 3 rise 2
    server weblogic-a-ff4j weblogic-a-integrated:7001 check
    server weblogic-b-ff4j weblogic-b-integrated:7001 check backup

# Backend para feature-flags (INTEGRADO)
backend feature-flags-backend
    balance roundrobin
    default-server inter 5s fall 3 rise 2
    server weblogic-a-feature weblogic-a-integrated:7001 check
    server weblogic-b-feature weblogic-b-integrated:7001 check backup

# Backend para version-a (INTEGRADO)
backend version-a-backend
    balance roundrobin
    default-server inter 5s fall 3 rise 2
    server weblogic-a-version weblogic-a-integrated:7001 check

# Backend para version-b (INTEGRADO)
backend version-b-backend
    balance roundrobin
    default-server inter 5s fall 3 rise 2
    server weblogic-b-version weblogic-b-integrated:7001 check

# Backend para weblogic-features versión A (INTEGRADO)
backend weblogic-features-a
    balance roundrobin
    default-server inter 5s fall 3 rise 2
    server weblogic-a-features weblogic-a-integrated:7001 check

# Backend para weblogic-features versión B (INTEGRADO)
backend weblogic-features-b
    balance roundrobin
    default-server inter 5s fall 3 rise 2
    server weblogic-b-features weblogic-b-integrated:7001 check

# Backend para el dashboard profesional de tráfico (INTEGRADO)
backend dashboard-backend
    balance roundrobin
    default-server inter 5s fall 3 rise 2
    server dashboard-integrated dashboard-integrated:80 check
