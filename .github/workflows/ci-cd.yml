name: CI/CD Pipeline - Oracle WebLogic Docker Platform

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  validate:
    name: 🔍 Validate Configuration
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v5

    - name: 🔍 Validate Docker Compose files
      run: |
        echo "🔍 Validating Docker Compose configurations..."
        docker-compose -f docker-compose.yml config
        docker-compose -f docker-compose.dockerhub.yml config

    - name: 🔍 Validate environment files
      run: |
        echo "🔍 Validating environment configurations..."
        if [ -f .env ]; then
          echo "✅ Main .env file found"
          # Validate required environment variables
          grep -q "ORACLE_PASSWORD" .env || echo "⚠️  ORACLE_PASSWORD not found"
          grep -q "WEBLOGIC_PASSWORD" .env || echo "⚠️  WEBLOGIC_PASSWORD not found"
        fi

    - name: 🔍 Validate HAProxy configuration
      run: |
        echo "🔍 Validating HAProxy configuration..."
        if [ -f haproxy/config/haproxy.cfg ]; then
          echo "✅ HAProxy config found"
          # Basic syntax validation
          docker run --rm -v $(pwd)/haproxy/config:/usr/local/etc/haproxy:ro haproxy:2.4 haproxy -c -f /usr/local/etc/haproxy/haproxy.cfg
        fi

    - name: 🔍 Validate MkDocs configuration
      run: |
        echo "🔍 Validating MkDocs configuration..."
        if [ -f mkdocs.yml ]; then
          echo "✅ MkDocs config found"
          pip install mkdocs
          mkdocs build --strict
        fi

  build-images:
    name: 🏗️ Build Docker Images
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        component: [weblogic, haproxy, mkdocs, oracle-db]
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v5

    - name: 🏗️ Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🔐 Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: 🏗️ Build ${{ matrix.component }} image
      run: |
        case "${{ matrix.component }}" in
          "weblogic")
            echo "🏗️ Building WebLogic Feature Flags image..."
            docker build -f applications/weblogic-feature-flags/Dockerfile -t weblogic-feature-flags:latest applications/weblogic-feature-flags/
            ;;
          "haproxy")
            echo "🏗️ Building HAProxy Advanced image..."
            docker build -f applications/haproxy-advanced/Dockerfile -t haproxy-advanced:latest applications/haproxy-advanced/
            ;;
          "mkdocs")
            echo "🏗️ Building MkDocs Server image..."
            docker build -f applications/mkdocs-server/Dockerfile -t mkdocs-server:latest applications/mkdocs-server/
            ;;
          "oracle-db")
            echo "🏗️ Building Oracle Express DB image..."
            docker build -f applications/oracle-express-db/Dockerfile -t oracle-express-db:latest applications/oracle-express-db/
            ;;
        esac

    - name: 🧪 Test ${{ matrix.component }} image
      run: |
        echo "🧪 Testing ${{ matrix.component }} image..."
        case "${{ matrix.component }}" in
          "weblogic")
            docker run --rm -d --name test-weblogic weblogic-feature-flags:latest
            sleep 30
            docker logs test-weblogic
            docker stop test-weblogic
            ;;
          "haproxy")
            docker run --rm -d --name test-haproxy -p 8080:80 haproxy-advanced:latest
            sleep 10
            curl -f http://localhost:8080/health || echo "HAProxy health check failed"
            docker stop test-haproxy
            ;;
          "mkdocs")
            docker run --rm -d --name test-mkdocs -p 8000:8000 mkdocs-server:latest
            sleep 10
            curl -f http://localhost:8000 || echo "MkDocs health check failed"
            docker stop test-mkdocs
            ;;
        esac

    - name: 🏷️ Tag and push to Docker Hub
      if: github.ref == 'refs/heads/main'
      run: |
        IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.component }}"
        case "${{ matrix.component }}" in
          "weblogic")
            docker tag weblogic-feature-flags:latest ${IMAGE_NAME}:latest
            docker tag weblogic-feature-flags:latest ${IMAGE_NAME}:v1.1.0
            docker push ${IMAGE_NAME}:latest
            docker push ${IMAGE_NAME}:v1.1.0
            ;;
          "haproxy")
            docker tag haproxy-advanced:latest ${IMAGE_NAME}:latest
            docker tag haproxy-advanced:latest ${IMAGE_NAME}:v1.1.0
            docker push ${IMAGE_NAME}:latest
            docker push ${IMAGE_NAME}:v1.1.0
            ;;
          "mkdocs")
            docker tag mkdocs-server:latest ${IMAGE_NAME}:latest
            docker tag mkdocs-server:latest ${IMAGE_NAME}:v1.1.0
            docker push ${IMAGE_NAME}:latest
            docker push ${IMAGE_NAME}:v1.1.0
            ;;
          "oracle-db")
            docker tag oracle-express-db:latest ${IMAGE_NAME}:latest
            docker tag oracle-express-db:latest ${IMAGE_NAME}:v1.1.0
            docker push ${IMAGE_NAME}:latest
            docker push ${IMAGE_NAME}:v1.1.0
            ;;
        esac

  integration-test:
    name: 🧪 Integration Testing
    runs-on: ubuntu-latest
    needs: build-images
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v5

    - name: 🚀 Start services with Docker Compose
      run: |
        echo "🚀 Starting integration test environment..."
        cp .env.example .env
        docker-compose -f docker-compose.dockerhub.yml up -d
        
    - name: ⏳ Wait for services to be ready
      run: |
        echo "⏳ Waiting for services to start..."
        sleep 120
        
    - name: 🧪 Run integration tests
      run: |
        echo "🧪 Running integration tests..."
        
        # Test HAProxy
        echo "🔍 Testing HAProxy..."
        curl -f http://localhost:80/health || echo "HAProxy health check failed"
        
        # Test MkDocs
        echo "🔍 Testing MkDocs..."
        curl -f http://localhost:8000 || echo "MkDocs health check failed"
        
        # Test WebLogic (if accessible)
        echo "🔍 Testing WebLogic..."
        curl -f http://localhost:7001/console || echo "WebLogic console not accessible (expected during startup)"
        
        # Test Feature Flags
        echo "🔍 Testing Feature Flags..."
        curl -f http://localhost:80/feature-flags || echo "Feature flags endpoint test"

    - name: 📊 Collect service logs
      if: always()
      run: |
        echo "📊 Collecting service logs..."
        docker-compose -f docker-compose.dockerhub.yml logs > integration-test-logs.txt

    - name: 📦 Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: integration-test-logs
        path: integration-test-logs.txt
        retention-days: 7

    - name: 🛑 Stop services
      if: always()
      run: |
        echo "🛑 Stopping services..."
        docker-compose -f docker-compose.dockerhub.yml down -v

  canary-deployment:
    name: 🐤 Canary Deployment
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v5

    - name: 🐤 Deploy Canary Version
      run: |
        echo "🐤 Starting canary deployment..."
        echo "📊 Deploying to 10% of traffic..."
        echo "🔍 Monitoring canary metrics..."
        
        # Simulate canary deployment
        sleep 30
        
        echo "✅ Canary deployment successful"
        echo "🚀 Promoting to full deployment"

  feature-flag-management:
    name: 🚩 Feature Flag Management
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v5

    - name: 🚩 Update Feature Flags
      run: |
        echo "🚩 Managing feature flags deployment..."
        echo "🔄 Updating feature flag configurations..."
        echo "📊 Analyzing feature usage metrics..."
        echo "🎯 Optimizing feature rollout strategy..."

  deploy-dev:
    name: 🚀 Deploy to Development
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/develop'
    environment: development
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v5

    - name: 🚀 Deploy to Development
      run: |
        echo "🚀 Deploying Oracle WebLogic Platform to Development..."
        echo "🐳 Using Docker Hub images for deployment..."
        echo "🔧 Configuring development environment..."
        # Add your deployment commands here
        # kubectl apply -f k8s/dev/
        # helm upgrade --install weblogic-dev ./helm-chart

  deploy-prod:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [integration-test, canary-deployment, feature-flag-management]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v5

    - name: 🚀 Deploy to Production
      run: |
        echo "🚀 Deploying Oracle WebLogic Platform to Production..."
        echo "🐳 Using verified Docker Hub images..."
        echo "🚩 Implementing feature flag strategy..."
        echo "📊 Setting up monitoring and alerting..."
        # Add your deployment commands here
        # kubectl apply -f k8s/prod/
        # helm upgrade --install weblogic-prod ./helm-chart

  monitoring-setup:
    name: 📊 Setup Monitoring
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v5

    - name: 📊 Configure Monitoring
      run: |
        echo "📊 Setting up comprehensive monitoring..."
        echo "🔍 WebLogic server monitoring..."
        echo "📈 HAProxy metrics collection..."
        echo "🚩 Feature flag usage tracking..."
        echo "🔔 Alert configuration..."

  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v5

    - name: 🔍 Scan Docker images for vulnerabilities
      run: |
        echo "🔍 Running security scans on Docker images..."
        
        # Install Trivy
        sudo apt-get update
        sudo apt-get install wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install trivy
        
        # Scan configurations
        trivy fs --security-checks config .

    - name: 🔍 Check for secrets in code
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD
        extra_args: --debug --only-verified
