<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>version-a</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #4CAF5010;
        }
        h1 {
            color: #4CAF50;
        }
        .version {
            display: inline-block;
            padding: 5px 10px;
            background-color: #4CAF50;
            color: white;
            border-radius: 4px;
            font-weight: bold;
        }
        .links {
            margin-top: 20px;
        }
        .links a {
            display: inline-block;
            margin-right: 10px;
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
        .links a:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>version-a</h1>
        
        <p>Esta es una aplicación de ejemplo para Oracle WebLogic Server.</p>
        
        <p>Versión: <span class="version">A</span></p>
        
        <p>Fecha de construcción: Mon Jul 21 22:53:58 -05 2025</p>
        
        <div class="links">
            <a href="info.html">Información</a>
        </div>
    </div>
</body>
</html>
